<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Card</title>
    <link rel="stylesheet" href="student_card.css">
    <style>
        .card {
            width: 50%;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: lightblue;
        }
        h1 {
            color: #ff0000;
        }
        .card p {
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="student-name" style="text-align: center;">John Doe</h1>
        <p>This is a short bio about the student.</p>
        <section>
            <p>Email: john.doe@example.com</p>
            <p>Location: New York</p>
        </section>
        <button>Contact Me</button>
    </div>
</body>
</html>
