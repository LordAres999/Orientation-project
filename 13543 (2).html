<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>Student Orientation Form</legend>
            <h1>Veritas Orientation Form</h1>
    <div>
        <label for="Name:">Fullname:</label>
        <input type="text" name="name" id="name"><br></br>

        <label for="Matric:">Matric No:</label>
        <input type="text" name="name" id="name"><br></br>

        <label for="Email:">Email:</label>
        <input type="email" name="Email" id="Email"><br></br>

        <label for="Age:">Age:</label>
         <input type="number" name="Age" id="Age"><br></br>
        <div>
            <p>Gender</p>
            <input type="radio" name="gender" id="male">
            <label for="male">Male</label>
            <input type="radio" name="gender" id="female">
            <label for="female">Female</label><br></br>

            <p>Document submitted:</p>
            <input type="checkbox" name="Document submitted" id="Admission letter">
            <label for="Admission letter">Admission letter</label>

            <input type="checkbox" name="Document submitted" id="Transcript">
            <label for="Transcript">Transcript</label><br></br>

            <label for="Date:">Date of birth:</label><br></br>
            <input type="date" name="Date of birth" id="Date of birth"><br></br>

            <label for="passport">Upload Passport:</label><br></br>
            <input type="file" name="passport" id="passport"><br></br>

            <label for="faculty">faculty:</label><br></br>
            <select name="Faculty" id="faculty">
                <option value="Medicine">Medicine</option>
                <option value="software">software Engineering</option>
                <option value="law">law</option>
            </select><br></br>

            <label for="info">Additional information:</label><br></br>
            <textarea name="info" id="Additional information" rows="4" cols="50" placeholder="Enter any additional information"></textarea><br></br>
           

            <button type="submit" value="submit">Submit</button>
            <button type="reset" value="reset">Reset</button>
        </div>       
        </fieldset>
    </div><br>
    
    </form>
</body>
</html>
